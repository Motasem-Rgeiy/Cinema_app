{% extends "base.html" %}

{% block content %}
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: #1a1a1a;
        color: #ffffff;
        min-height: 100vh;
    }

    .profile-container {
        max-width: 600px;
        margin: 40px auto;
        padding: 40px;
        background: #2a2a2a;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .profile-container h1 {
        font-size: 32px;
        margin-bottom: 30px;
        color: #FF1493;
        text-align: center;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        font-weight: 600;
        color: #999;
        margin-bottom: 8px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .form-group input {
        width: 100%;
        padding: 12px 15px;
        background: #1a1a1a;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        color: #e0e0e0;
        font-family: inherit;
        font-size: 15px;
        transition: border-color 0.3s ease;
    }

    .form-group input:focus {
        outline: none;
        border-color: #FF1493;
        background: #0a0a0a;
    }

    .form-actions {
        display: flex;
        gap: 10px;
        margin-top: 30px;
    }

    .btn-submit {
        background: #FF1493;
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        font-size: 15px;
        transition: background 0.3s ease;
        flex: 1;
    }

    .btn-submit:hover {
        background: #FF6B6B;
    }

    .btn-cancel {
        background: #3a3a3a;
        color: #e0e0e0;
        border: 1px solid #555;
        padding: 12px 30px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        font-size: 15px;
        transition: background 0.3s ease;
        flex: 1;
    }

    .btn-cancel:hover {
        background: #555;
    }

    .error-message {
        background: rgba(244, 67, 54, 0.2);
        color: #f44336;
        padding: 12px 15px;
        border-radius: 6px;
        margin-bottom: 20px;
        border-left: 4px solid #f44336;
    }

    .success-message {
        background: rgba(76, 175, 80, 0.2);
        color: #4caf50;
        padding: 12px 15px;
        border-radius: 6px;
        margin-bottom: 20px;
        border-left: 4px solid #4caf50;
    }

    @media (max-width: 768px) {
        .profile-container {
            margin: 20px auto;
            padding: 20px;
        }

        .profile-container h1 {
            font-size: 24px;
        }

        .form-actions {
            flex-direction: column;
        }

        .btn-submit, .btn-cancel {
            width: 100%;
        }
    }
</style>

<div class="profile-container">
    <h1>Edit Profile</h1>

    {% if messages %}
        {% for message in messages %}
            <div class="{% if message.tags %}{{ message.tags }}{% endif %}-message">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="first_name">First Name</label>
            <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}" placeholder="Enter your first name">
        </div>

        <div class="form-group">
            <label for="last_name">Last Name</label>
            <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}" placeholder="Enter your last name">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" value="{{ user.email }}" placeholder="Enter your email address">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-submit">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
